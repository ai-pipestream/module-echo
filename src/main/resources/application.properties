quarkus.application.name=echo

# ======================================================================================================================
# Worker Loop Configuration
# cluster/graph/node reconciled with the engine graph in Plan 2
# ======================================================================================================================
pipestream.module.worker-loop.enabled=true
pipestream.module.worker-loop.cluster=bench
pipestream.module.worker-loop.graph-id=bench-graph
pipestream.module.worker-loop.node-id=bench-node
pipestream.module.worker-loop.module-id=echo
# Echo is the intake blast absorber — 100 concurrent streams per architecture doc §15
pipestream.module.worker-loop.concurrency=100

# ======================================================================================================================
# Engine gRPC Client + Stork/Consul Service Discovery
# engine endpoint placeholder — reconcile in Plan 2
# Mirrored from connector-intake-service-redis-sidecar-pr0/src/main/resources/application.properties
# and module-testing-sidecar-pr0/src/main/resources/application.properties (lines 137-142).
# BOTH halves required: quarkus.grpc.clients.engine.* AND quarkus.stork.engine.*
# Missing either half causes @GrpcClient("engine") to silently fall back to localhost:9000.
# ======================================================================================================================
quarkus.grpc.clients.engine.host=engine
quarkus.grpc.clients.engine.name-resolver=stork
quarkus.stork.engine.service-discovery.type=consul
quarkus.stork.engine.service-discovery.consul-host=${CONSUL_HOST:localhost}
quarkus.stork.engine.service-discovery.consul-port=${CONSUL_PORT:8500}
quarkus.stork.engine.service-discovery.refresh-period=30S
