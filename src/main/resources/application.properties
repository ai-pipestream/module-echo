# Echo Module Configuration
quarkus.application.name=echo
quarkus.application.version=${PIPESTREAM_VERSION:0.0.0-dev}
pipestream.build.commit=${GIT_COMMIT:unknown}
pipestream.build.branch=${GIT_BRANCH:unknown}
pipestream.build.time=${BUILD_TIME:unknown}

# Production HTTP/gRPC Server Configuration
quarkus.http.port=19000
quarkus.http.test-port=0

# Pipestream Core Configuration
pipestream.server.class=module
pipestream.registration.type=MODULE
pipestream.registration.mode=AUTO

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."ai.pipestream".level=DEBUG

# Module Registration Metadata
pipestream.registration.service-name=echo
pipestream.registration.description=Echo module for testing and validation in document processing pipeline
pipestream.registration.tags=echo,testing,module

# Test settings
%test.quarkus.http.port=0
%test.quarkus.grpc.server.test-port=0
%test.quarkus.dynamic-grpc.service.echo.address=localhost:${quarkus.grpc.server.test-port}
