quarkus.application.name=echo

# Hardcoded port allocation to avoid 8080/8081 fallbacks or profile resolution issues
quarkus.http.port=19100
quarkus.http.host=0.0.0.0

# Unified Vert.x server: gRPC shares quarkus.http.port (19100). Platform registration
# advertises that port for the PipeStepProcessor metadata callback. Without this
# flag Quarkus defaults to a SEPARATE gRPC server on port 9000 — which is what
# was happening; the comment described the intent but the config never enforced it.
quarkus.grpc.server.use-separate-server=false

# Registration is not required to stay running
pipestream.registration.required=false
# ======================================================================================================================
# Worker Loop Configuration
# ======================================================================================================================
pipestream.module.worker-loop.enabled=true
pipestream.module.worker-loop.module-id=echo
# Ramp-up demand-pull: one idle poller every ~3s when the queue is empty;
# spawn more workers (up to max) only while work is flowing.
pipestream.module.worker-loop.min-concurrency=1
pipestream.module.worker-loop.concurrency=${ECHO_WORKER_MAX_CONCURRENCY:100}
pipestream.module.worker-loop.no-work-retry-after=${ECHO_IDLE_POLL_INTERVAL:3s}

# ======================================================================================================================
# Quarkus Indexing
# ======================================================================================================================
quarkus.index-dependency.pipestream-server.group-id=ai.pipestream
quarkus.index-dependency.pipestream-server.artifact-id=pipestream-server
# Exclude ModuleWorkerLoop class itself from being a bean; we produce it manually in EchoWorkerConfig
quarkus.arc.exclude-types=ai.pipestream.server.work.ModuleWorkerLoop

# ======================================================================================================================
# Engine gRPC Client + Stork/Consul Service Discovery
# engine endpoint placeholder — reconcile in Plan 2
# Mirrored from connector-intake-service-redis-sidecar-pr0/src/main/resources/application.properties
# and module-testing-sidecar-pr0/src/main/resources/application.properties (lines 137-142).
# BOTH halves required: quarkus.grpc.clients.engine.* AND quarkus.stork.engine.*
# Missing either half causes @GrpcClient("engine") to silently fall back to localhost:9000.
# ======================================================================================================================
quarkus.grpc.clients.engine.host=engine
quarkus.grpc.clients.engine.name-resolver=stork
# Echo's WorkUnit payload is whatever the intake produced — for the bench
# corpus that's small, but any raw upload could legitimately hit MiBs.
# Raise the cap so we don't quietly lose monster docs on the very first hop.
quarkus.grpc.clients.engine.max-inbound-message-size=2147483647
quarkus.stork.engine.service-discovery.type=consul
quarkus.stork.engine.service-discovery.consul-host=${CONSUL_HOST:localhost}
quarkus.stork.engine.service-discovery.consul-port=${CONSUL_PORT:8500}
quarkus.stork.engine.service-discovery.refresh-period=30S

# ======================================================================================================================
# Pipestream Service Registration Configuration
# ======================================================================================================================
pipestream.server.class=module
pipestream.registration.type=MODULE
pipestream.registration.mode=grpc
pipestream.registration.description=Echo module for document processing pipeline (intake blast absorber)
pipestream.registration.capabilities=echo,identity-processor
pipestream.registration.tags=echo,intake,module

# Inline module registration metadata (replaces GetServiceRegistration callback)
pipestream.registration.module.display-name=Echo
pipestream.registration.module.description=Echo module for document processing pipeline (intake blast absorber)
pipestream.registration.module.health-check-passed=true
pipestream.registration.module.health-check-message=Demand-pull via ModuleWorkService; identity processor
